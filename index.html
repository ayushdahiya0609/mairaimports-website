<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | Maira Imports Pty Ltd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d1b3e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Background shapes */
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,162,39,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; left: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,162,39,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      margin-bottom: 48px;
    }
    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #c9a227;
      display: block;
      letter-spacing: .02em;
    }
    .logo-sub {
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      display: block;
      margin-top: 4px;
    }

    .badge {
      display: inline-block;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #c9a227;
      background: rgba(201,162,39,.1);
      border: 1px solid rgba(201,162,39,.3);
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 20px;
      color: #fff;
    }
    h1 span { color: #c9a227; }

    p {
      font-size: clamp(.95rem, 2vw, 1.1rem);
      color: rgba(255,255,255,.6);
      max-width: 500px;
      line-height: 1.75;
      margin-bottom: 48px;
    }

    .contact-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }
    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all .25s ease;
    }
    .btn-wa {
      background: #25d366;
      color: #fff;
    }
    .btn-wa:hover { background: #1ebe5d; transform: translateY(-2px); }
    .btn-call {
      background: rgba(255,255,255,.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,.2);
    }
    .btn-call:hover { background: rgba(255,255,255,.14); transform: translateY(-2px); }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c9a227, transparent);
      margin: 0 auto 32px;
    }

    .footer-note {
      font-size: .78rem;
      color: rgba(255,255,255,.25);
      letter-spacing: .04em;
    }
  </style>
</head>
<body>

  <div class="logo">
    <span class="logo-main">Maira Imports</span>
    <span class="logo-sub">Pty Ltd</span>
  </div>

  <div class="badge">We're almost there</div>

  <h1>Something <span>exciting</span><br />is coming soon</h1>

  <p>We're putting the finishing touches on our website. Maira Imports — Australia's trusted wholesale importer of Indian groceries and cultural products — will be back shortly.</p>

  <div class="divider"></div>

  

</body>
</html>
